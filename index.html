<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Study Course</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #f5f7fb;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 20px;
            padding: 40px 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .bullet-points {
            list-style-position: outside;
            padding-left: 25px;
            margin-bottom: 40px;
        }

        .bullet-points li {
            font-size: 1.4rem;
            line-height: 1.5;
            margin-bottom: 20px;
            color: #111;
            text-align: left;
        }

        .phone {
            font-size: 1.15rem;
            line-height: 1.6;
            margin-bottom: 35px;
            color: #222;
            text-align: left;
        }

        .phone strong {
            font-weight: 700;
        }

        .cta-button {
            width: 100%;
            background: #0066ff;
            color: white;
            border: none;
            border-radius: 14px;
            padding: 20px;
            font-size: 1.25rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .cta-button:hover {
            transform: translateY(-2px);
        }

        a {
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="container">

        <ul class="bullet-points">
            <li>Page gone blank while reading?</li>
            <li>Given up in the middle of study?</li>
            <li>Not getting the grades you expected?</li>
        </ul>

        <div class="phone">
            For questions or help call:<br>
            <strong>860 - 494 - 5858</strong>
        </div>

        <a href="https://www.scientology.org/courses/study/overview.html" target="_blank">
            <button class="cta-button">
                Click here for Free Course
            </button>
        </a>

    </div>

</body>
</html>
