<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn How To Study</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        :root { --primary: #0066ff; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #e8f0ff 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            max-width: 480px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15);
            overflow: hidden;
        }
        
        .hero {
            background: linear-gradient(135deg, #0066ff, #0044cc);
            color: white;
            padding: 60px 35px 50px;
            text-align: center;
        }
        
        h1 {
            font-size: 1.95rem;
            line-height: 1.15;
            font-weight: 700;
        }
        
        .content {
            padding: 45px 35px;
            text-align: center;
        }
        
        .problem {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 30px;
        }
        
        .highlight {
            background: #fff3b0;
            padding: 2px 6px;
            border-radius: 4px;
        }
        
        .cta-button {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 20px 30px;
            font-size: 1.35rem;
            font-weight: 600;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            margin: 30px 0 20px;
            box-shadow: 0 10px 20px -5px rgb(0 102 255 / 0.4);
            transition: all 0.3s;
        }
        
        .cta-button:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 25px -5px rgb(0 102 255 / 0.5);
        }
        
        .info {
            font-size: 0.95rem;
            color: #666;
            margin-top: 25px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>Page gone blank while reading?<br><br>
                Given up in the middle of study?<br><br>
                Not getting the grades you expected?</h1>
        </div>

        <div class="content">
            <p class="problem">
                The problem is that you've never actually learned <span class="highlight">HOW TO STUDY</span>.
            </p>
            
            <p style="font-size:1.25rem; margin-bottom: 35px;">
                There are three Barriers to your study and these are them:
            </p>

            <button onclick="trackAndRedirect()" class="cta-button">
                Show Me The 3 Barriers →
            </button>

            <p class="info">
                Tap the button to discover the solution
            </p>
        </div>
    </div>

    <script>
        let visits = JSON.parse(localStorage.getItem('studyVisits')) || [];

        function getBrowserInfo() {
            return {
                date: new Date().toLocaleString(),
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent,
                language: navigator.language,
                platform: navigator.platform,
                screenWidth: window.screen.width,
                screenHeight: window.screen.height,
                viewportWidth: window.innerWidth,
                viewportHeight: window.innerHeight,
                referrer: document.referrer || "Direct",
                url: window.location.href
            };
        }

        function downloadCSV() {
            if (visits.length === 0) {
                alert("No visits recorded yet.");
                return;
            }

            let csv = "Date,Time,Device,Browser,Screen Size,Language,Referrer\n";
            
            visits.forEach(v => {
                csv += `"${v.date}","${v.timestamp}","${v.platform}","${v.userAgent.substring(0,100)}","${v.screenWidth}x${v.screenHeight}","${v.language}","${v.referrer}"\n`;
            });

            const encodedUri = encodeURI("data:text/csv;charset=utf-8," + csv);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `study_page_visits_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function trackAndRedirect() {
            const data = getBrowserInfo();
            visits.push(data);
            localStorage.setItem('studyVisits', JSON.stringify(visits));

            // Redirect to Scientology page
            window.location.href = "https://www.scientology.org/courses/study/overview.html";
        }

        // Show how many visits are stored (for you when you open the page)
        console.log(`%cTotal visits recorded: ${visits.length}`, 'color: #0066ff; font-size: 14px;');
        
        // Optional: Add a small link at bottom for you to download CSV
        window.onload = () => {
            if (visits.length > 0) {
                const downloadLink = document.createElement('a');
                downloadLink.href = "#";
                downloadLink.textContent = "📥 Download Visits CSV";
                downloadLink.style.position = "fixed";
                downloadLink.style.bottom = "15px";
                downloadLink.style.left = "50%";
                downloadLink.style.transform = "translateX(-50%)";
                downloadLink.style.fontSize = "0.9rem";
                downloadLink.onclick = (e) => { e.preventDefault(); downloadCSV(); };
                document.body.appendChild(downloadLink);
            }
        };
    </script>
</body>
</html>
