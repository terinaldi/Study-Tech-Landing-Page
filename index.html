<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn How To Study</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #e8f0ff 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            max-width: 480px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px -12px rgb(0 0 0 / 0.1);
            overflow: hidden;
        }
        
        .hero {
            background: linear-gradient(135deg, #0066ff, #0044cc);
            color: white;
            padding: 50px 35px 40px;
            text-align: center;
        }
        
        h1 {
            font-size: 2rem;
            line-height: 1.2;
            font-weight: 700;
        }
        
        .content {
            padding: 45px 35px;
        }
        
        .bullet-points {
            font-size: 1.35rem;
            line-height: 1.45;
            margin-bottom: 35px;
        }
        
        .bullet-points li {
            margin-bottom: 18px;
            padding-left: 8px;
        }
        
        input {
            width: 100%;
            padding: 16px 18px;
            margin-bottom: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1.1rem;
        }
        
        input:focus {
            outline: none;
            border-color: #0066ff;
        }
        
        .phone-help {
            text-align: center;
            font-size: 1.18rem;
            margin: 25px 0 30px;
            color: #222;
        }
        
        .cta-button {
            width: 100%;
            background: #0066ff;
            color: white;
            padding: 22px;
            font-size: 1.4rem;
            font-weight: 600;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 10px 20px -5px rgb(0 102 255 / 0.35);
            transition: all 0.3s ease;
        }
        
        .cta-button:hover {
            transform: translateY(-3px);
        }
        
        .required {
            font-size: 0.9rem;
            color: #666;
            text-align: center;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Hero -->
        <div class="hero">
            <h1>Page gone blank while reading?<br><br>
                Given up in the middle of study?<br><br>
                Not getting the grades you expected?</h1>
        </div>

        <!-- Content -->
        <div class="content">
            <ul class="bullet-points">
                <li>Page gone blank while reading?</li>
                <li>Given up in the middle of study?</li>
                <li>Not getting the grades you expected?</li>
            </ul>

            <form id="leadForm">
                <input type="text" id="name" placeholder="Your Full Name" required>
                <input type="tel" id="phone" placeholder="Phone Number" required>
                
                <button type="submit" class="cta-button">
                    Click here for Free Course
                </button>
            </form>

            <div class="phone-help">
                For questions or help call:<br>
                <strong>860-494-5858</strong>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('leadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            
            if (name && phone) {
                // Redirect to the course
                window.location.href = "https://www.scientology.org/courses/study/overview.html";
            }
        });
    </script>
</body>
</html>
