<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Free Study Course</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f4f6f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 520px;
            border-radius: 20px;
            padding: 48px 40px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
        }

        .bullet-points {
            padding-left: 28px;
            margin-bottom: 50px;
        }

        .bullet-points li {
            font-size: 1.45rem;
            line-height: 1.5;
            margin-bottom: 24px;
            color: #111;
        }

        .phone {
            font-size: 1.9rem;
            line-height: 1.4;
            font-weight: 700;
            color: #111;
            margin-bottom: 40px;
        }

        .cta-button {
            width: 100%;
            background: #0066ff;
            color: white;
            border: none;
            border-radius: 16px;
            padding: 22px;
            font-size: 1.35rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .cta-button:hover {
            transform: translateY(-2px);
        }

        a {
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="container">

        <ul class="bullet-points">
            <li>Page gone blank while reading?</li>
            <li>Given up in the middle of study?</li>
            <li>Not getting the grades you expected?</li>
        </ul>

        <div class="phone">
            For questions or help call:<br>
            860 - 494 - 5858
        </div>

        <a 
            href="https://www.scientology.org/courses/study/overview.html" 
            target="_blank" 
            rel="noopener noreferrer"
        >
            <button class="cta-button">
                Click here for Free Course
            </button>
        </a>

    </div>

</body>
</html>
