<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Free Study Course</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, #0b1220 0%, #111827 100%);
            color: white;
            overflow: hidden;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            height: 100vh;
            padding: 60px 28px 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background:
                radial-gradient(circle at top right, rgba(59,130,246,0.35), transparent 30%),
                radial-gradient(circle at bottom left, rgba(37,99,235,0.25), transparent 35%);
        }

        .top-section {
            margin-top: 20px;
        }

        .bullet-points {
            list-style: none;
        }

        .bullet-points li {
            position: relative;
            padding-left: 26px;
            margin-bottom: 34px;
            font-size: 2rem;
            line-height: 1.2;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: #ffffff;
        }

        .bullet-points li::before {
            content: "•";
            position: absolute;
            left: 0;
            top: 0;
            color: #60a5fa;
            font-size: 2rem;
        }

        .bottom-section {
            width: 100%;
        }

        .phone {
            font-size: 1.6rem;
            line-height: 1.35;
            font-weight: 700;
            margin-bottom: 28px;
            color: #dbeafe;
        }

        .phone-number {
            display: block;
            margin-top: 8px;
            font-size: 2.2rem;
            color: #ffffff;
            font-weight: 800;
            letter-spacing: -0.04em;
        }

        .cta-button {
            width: 100%;
            border: none;
            border-radius: 22px;
            padding: 24px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            font-size: 1.45rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 14px 30px rgba(37,99,235,0.45);
            transition: transform 0.2s ease;
        }

        .cta-button:active {
            transform: scale(0.98);
        }

        a {
            text-decoration: none;
        }

        @media (max-width: 430px) {
            .bullet-points li {
                font-size: 1.8rem;
            }

            .phone {
                font-size: 1.45rem;
            }

            .phone-number {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="top-section">
            <ul class="bullet-points">
                <li>Page gone blank while reading?</li>
                <li>Given up in the middle of study?</li>
                <li>Not getting the grades you expected?</li>
            </ul>
        </div>

        <div class="bottom-section">

            <div class="phone">
                For questions or help call:
                <span class="phone-number">860 - 494 - 5858</span>
            </div>

            <a
                href="https://www.scientology.org/courses/study/overview.html"
                target="_blank"
                rel="noopener noreferrer"
            >
                <button class="cta-button">
                    Click here for Free Course
                </button>
            </a>

        </div>

    </div>

</body>
</html>
